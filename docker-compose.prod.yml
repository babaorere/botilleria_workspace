# ============================================================================
# BOTILLERIA CORE — Production Docker Compose
# ============================================================================
# Nginx (static + reverse proxy) + FastAPI + PostgreSQL + Redis
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  # ── PostgreSQL: Database ─────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: botilleria_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-windmill}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-windmill}
      - POSTGRES_DB=${DB_NAME:-botilleria}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - botilleria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windmill -d botilleria"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Redis: Sessions & Cache ──────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: botilleria_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    networks:
      - botilleria_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Nginx: Static files + Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: botilleria_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/tenant:/usr/share/nginx/html/tenant:ro
      - ./frontend/admin:/usr/share/nginx/html/admin:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - botilleria_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

  # ── FastAPI: Backend API ─────────────────────────────────────────────────
  api:
    build:
      context: ./botilleria_core
      dockerfile: Dockerfile
    container_name: botilleria_api
    restart: unless-stopped
    env_file:
      - ./botilleria_core/.env.local
    expose:
      - "8000"
    volumes:
      - botilleria_venv:/app/.venv
    networks:
      - botilleria_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M

volumes:
  botilleria_venv:
  db_data:
  redis_data:
  nginx_cache:
  nginx_run:

networks:
  botilleria_net:
    driver: bridge
