global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'telegram_alerts'

receivers:
  - name: 'null'
  - name: 'telegram_alerts'
    telegram_configs:
      - bot_token: 'TU_TELEGRAM_BOT_TOKEN_AQUI'
        chat_id: -1001234567890 # Reemplazar con ID de grupo real
        message: '🚨 *{{ .Status | toUpper }}* 🚨\n\n{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        parse_mode: 'Markdown'

inhibit_rules:
  # Suppress lower severity alerts when higher severity exists
  - source_match:
      severity: 'critical'
    target_match:
      severity: ['warning', 'info']
    equal: ['alertname', 'job', 'instance']

  # Suppress warnings when info exists
  - source_match:
      severity: 'warning'
    target_match:
      severity: ['info']
    equal: ['alertname', 'job', 'instance']