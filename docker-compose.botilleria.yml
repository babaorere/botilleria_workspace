# ============================================================================
# BOTILLERIA CORE — Docker Compose
# ============================================================================
# Servicio FastAPI multiusuario + PostgreSQL compartido de Windmill
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  redis:
    image: redis:7.4-alpine
    container_name: botilleria_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - botilleria_redis_data:/data
    networks:
      - botilleria_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  db:
    image: postgres:17-alpine
    container_name: botilleria_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-windmill}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-windmill}
      - POSTGRES_DB=${DB_NAME:-botilleria}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - botilleria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windmill -d botilleria"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  botilleria_api:
    build:
      context: ./botilleria_core
      dockerfile: Dockerfile
    container_name: botilleria_core_api
    restart: unless-stopped
    env_file:
      - ./botilleria_core/.env.local
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-windmill}:${DB_PASSWORD:-windmill}@db:5432/${DB_NAME:-botilleria}
    ports:
      - "8001:8000"
    volumes:
      - ./botilleria_core:/app
      - botilleria_venv:/app/.venv
      - ./nginx.conf:/app/nginx.conf:ro
    networks:
      - botilleria_net
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging: *default-logging

volumes:
  botilleria_venv:
  botilleria_redis_data:
  db_data:

networks:
  botilleria_net:
    external: true
    name: botilleria_workspace_botilleria_net
