# ============================================================================
# BOTILLERIA CORE — Docker Compose
# ============================================================================
# Servicio FastAPI multiusuario + PostgreSQL compartido de Windmill
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  redis:
    image: redis:7.4-alpine
    container_name: botilleria_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - botilleria_redis_data:/data
    networks:
      - botilleria_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  botilleria_api:
    build:
      context: ./botilleria_core
      dockerfile: Dockerfile
    container_name: botilleria_core_api
    restart: unless-stopped
    env_file:
      - ./botilleria_core/.env.local
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-windmill}:${DB_PASSWORD:-windmill}@db:5432/${DB_NAME:-botilleria}
    ports:
      - "8001:8000"
    volumes:
      - ./botilleria_core:/app
      - botilleria_venv:/app/.venv
    networks:
      - botilleria_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging: *default-logging

  # ── Init DB: crea la base de datos 'botilleria' en el PostgreSQL compartido ──
  # Removido porque usamos la BD de prod

volumes:
  botilleria_venv:
  botilleria_redis_data:

networks:
  botilleria_net:
    external: true
    name: botilleria_workspace_botilleria_net
