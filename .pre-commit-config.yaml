# ==============================================================================
# Pre-Commit Configuration — Botilleria Core
# ==============================================================================
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.3
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-docker
        name: pytest-docker
        entry: bash -c "CONTAINER=\$(docker ps --format '{{.Names}}' | grep -E 'botilleria_(core_)?api' | head -n 1); if [ -n '\$CONTAINER' ]; then docker cp nginx.conf \$CONTAINER:/nginx.conf && docker exec \$CONTAINER pytest; else echo 'No running container found. Please run ./up.sh -dev first.' && exit 1; fi"
        language: system
        pass_filenames: false
        always_run: true
